<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Route Framework Registration</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; justify-content: center; }
        .form-card { background: #1e293b; padding: 24px; border-radius: 12px; width: 100%; max-width: 500px; border: 1px solid #334155; }
        h2 { color: #38bdf8; text-align: center; margin-top: 0; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #94a3b8; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; margin-top: 4px; box-sizing: border-box; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; }
        button { background: #2563eb; color: white; font-weight: bold; border: none; padding: 12px; width: 100%; border-radius: 6px; margin-top: 20px; cursor: pointer; }
        .warning-banner { background: rgba(234, 179, 8, 0.15); border: 1px solid #eab308; color: #fde047; padding: 12px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 10px; }
        .success-banner { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #4ade80; padding: 12px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>A) Route Registration Form</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="{{ 'success-banner' if category == 'success' else 'warning-banner' }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <label>Select Company Partition Context:</label>
            <select name="company_name" required>
                {% for company in companies %} <option value="{{ company }}">{{ company }}</option> {% endfor %}
            </select>
            
            <label>Route Unique Name:</label>
            <input type="text" name="route_name" required placeholder="e.g., Gulshan">
            
            <label>Total Distance (Kilometers):</label>
            <input type="number" step="0.01" name="kms" required>
            
            <label>Fuel Consumption per KM (Liters):</label>
            <input type="number" step="0.001" name="fuel_cons_per_km" required>
            
            <label>Monthly Working Days:</label>
            <input type="number" name="working_days" required>
            
            <label>Route Rental Amount (Rs.):</label>
            <input type="number" step="0.01" name="route_rental" required>
            
    
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 20px;">
                <input type="checkbox" name="is_fixed_route" value="1" style="width: 20px; height: 20px;">
                <span style="font-size: 0.95rem; color: #38bdf8; font-weight: bold;">Is Fixed Value Route</span>
            </label>

            <button type="submit">Deploy Route Parameters</button>
        </form>
        <a href="/admin" style="display:block; text-align:center; margin-top:15px; color:#94a3b8; text-decoration:none;">← Return to Admin Hub</a>
    </div>
</body>
</html>
