<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Checkpoint Required</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .secure-box { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #ef4444; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #ef4444; font-size: 1.3rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 1.1rem; letter-spacing: 2px; }
        button { background: #ef4444; color: white; border: none; width: 100%; padding: 12px; font-weight: bold; border-radius: 6px; margin-top: 15px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #dc2626; }
        .back { display: block; margin-top: 15px; color: #94a3b8; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="secure-box">
        <h2>⚠️ Security Gatekeeper</h2>
        <p>You are attempting to modify financial variables or system routes. Please re-enter your administrator credentials to continue.</p>
        {% with msgs = get_flashed_messages() %} {% if msgs %}<p style="color:#f87171; font-weight:bold;">{{msgs[0]}}</p>{% endif %} {% endwith %}
        <form method="POST">
            <input type="hidden" name="action" value="verify_password">
            <input type="password" name="secure_pass" placeholder="••••••••" required autofocus>
            <button type="submit">Verify & Access Workspace</button>
        </form>
        <a href="/admin" class="back">Cancel Session</a>
    </div>
</body>
</html>
